<!doctype html>
<html lang="en" class="bg-background">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loominality AI — Explainable Fabric Defect Detection</title>
    <meta
      name="description"
      content="Loominality AI detects and explains fabric defects with bounding boxes, heatmaps, and severity scoring."
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("loominality-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = stored === "dark" || (!stored && prefersDark);
          if (isDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
